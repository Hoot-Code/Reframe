apiVersion: apps/v1
kind: Deployment
metadata:
  name: reframe-bot
  namespace: reframe
  labels:
    app: reframe-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reframe-bot
  template:
    metadata:
      labels:
        app: reframe-bot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      containers:
        - name: bot
          image: reframe-bot:latest
          ports:
            - containerPort: 9090
              name: metrics
          envFrom:
            - secretRef:
                name: reframe-secrets
            - configMapRef:
                name: reframe-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["python", "-c", "from handlers import request_shutdown; request_shutdown()"]
      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: reframe-config
  namespace: reframe
data:
  DB_BACKEND: "postgresql"
  DATABASE_URL: "postgresql://reframe:reframe@postgres:5432/reframe"
  REDIS_URL: "redis://redis:6379/0"
  FF_METRICS: "true"
  FF_TRACING: "true"
  FF_RATE_LIMITING: "true"
  FF_SCANNER: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: reframe-secrets
  namespace: reframe
type: Opaque
stringData:
  BOT_TOKEN: "YOUR_BOT_TOKEN_HERE"
  ADMIN_IDS: "YOUR_ADMIN_ID_HERE"

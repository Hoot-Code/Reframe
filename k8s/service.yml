apiVersion: v1
kind: Service
metadata:
  name: reframe-bot
  namespace: reframe
  labels:
    app: reframe-bot
spec:
  selector:
    app: reframe-bot
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: reframe-postgres
  namespace: reframe
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: reframe-redis
  namespace: reframe
spec:
  selector:
    app: redis
  ports:
    - port: 6379
